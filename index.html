<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Globle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; }
        .globe-container { cursor: grab; }
        .globe-container:active { cursor: grabbing; }
        
        /* Custom Scrollbar for guesses */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen font-sans overflow-x-hidden p-4">

    <!-- Header -->
    <header class="text-center my-4">
        <h1 class="text-4xl font-extrabold tracking-tight text-red-500">GLOBLE <span class="text-white">CLONE</span></h1>
        <p class="text-gray-400 mt-2 text-sm">Find the mystery country. The redder it is, the closer you are.</p>
        <p id="discord-status" class="text-xs text-yellow-500 mt-2">Connecting to Discord...</p>
    </header>

    <!-- Main Game Area -->
    <main class="w-full max-w-4xl flex flex-col md:flex-row gap-8 items-center md:items-start justify-center mt-4">
        
        <!-- Globe Section -->
        <div class="flex-1 flex flex-col items-center w-full max-w-md relative">
            <div id="loading" class="absolute inset-0 flex items-center justify-center bg-gray-900 bg-opacity-80 z-10 text-xl font-bold text-gray-300">
                Loading world data...
            </div>
            
            <div id="globe-wrapper" class="globe-container w-full aspect-square relative rounded-full shadow-[0_0_40px_rgba(59,130,246,0.15)] bg-[#0f172a]">
                <svg id="globe-svg" class="w-full h-full"></svg>
            </div>
        </div>

        <!-- Controls & Guesses Section -->
        <div class="flex-1 w-full max-w-md flex flex-col gap-4">
            
            <div id="win-message" class="hidden bg-green-900/50 border border-green-500 text-green-200 p-4 rounded-lg shadow-lg text-center animate-pulse">
                <h2 class="text-2xl font-bold mb-1">Fuck Yeah!</h2>
                <p>You found <span id="target-name-display" class="font-extrabold text-white"></span> in <span id="guess-count-display"></span> guesses.</p>
                <button onclick="location.reload()" class="mt-3 bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded font-bold transition">Play Again</button>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl shadow-xl border border-gray-700">
                <form id="guess-form" class="flex gap-2">
                    <input 
                        type="text" 
                        id="guess-input" 
                        list="countries-list" 
                        placeholder="Type a country name..." 
                        class="flex-1 bg-gray-900 border border-gray-600 rounded px-4 py-2 text-white focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition disabled:opacity-50"
                        autocomplete="off"
                    >
                    <datalist id="countries-list"></datalist>
                    <button type="submit" id="guess-btn" class="bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-6 rounded transition disabled:opacity-50 disabled:cursor-not-allowed">
                        Guess
                    </button>
                </form>
                <p id="error-msg" class="text-red-400 text-sm mt-2 hidden">That country doesn't exist or you already guessed it, try again.</p>
            </div>

            <!-- Guesses List -->
            <div class="bg-gray-800 rounded-xl shadow-xl border border-gray-700 flex-1 flex flex-col h-64 md:h-96">
                <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/80 rounded-t-xl">
                    <h3 class="font-bold text-gray-300">Your Guesses</h3>
                    <span id="guess-counter" class="text-xs bg-gray-700 text-gray-300 px-2 py-1 rounded-full">0</span>
                </div>
                <div class="p-2 flex-1 overflow-y-auto">
                    <ul id="guesses-ul" class="flex flex-col gap-2">
                        <!-- Guesses will be injected here -->
                    </ul>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { DiscordSDK } from "https://esm.sh/@discord/embedded-app-sdk";

        // Initialize Discord SDK to complete the iframe handshake
        const clientId = "1488705762820751420"; // Snagged from your screenshot
        const discordSdk = new DiscordSDK(clientId);

        async function setupDiscord() {
            const statusText = document.getElementById('discord-status');
            try {
                // 10 second timeout for Discord Handshake so it doesn't hang forever
                await Promise.race([
                    discordSdk.ready(),
                    new Promise((_, reject) => setTimeout(() => reject(new Error("Discord timeout")), 10000))
                ]);
                console.log("Discord handshake complete!");
                statusText.innerText = "Discord Connected 🚀";
                statusText.className = "text-xs text-green-400 mt-2";
            } catch (e) {
                console.log("Running in regular browser or handshake failed.");
                statusText.innerText = "Running outside Discord (Browser Mode)";
                statusText.className = "text-xs text-blue-400 mt-2";
            }
        }

        // --- GAME STATE ---
        let worldData = null;
        let targetCountry = null;
        let guesses = []; // Array of objects: { feature, distance }
        const MAX_DISTANCE = 15000; // km for color scaling
        let isGameOver = false;

        // --- D3 SETUP ---
        const svgElement = document.getElementById('globe-svg');
        const wrapper = document.getElementById('globe-wrapper');
        const width = wrapper.clientWidth;
        const height = wrapper.clientHeight;

        const svg = d3.select("#globe-svg")
            .attr("width", width)
            .attr("height", height);

        // Orthographic projection creates the 3D globe effect
        const projection = d3.geoOrthographic()
            .scale((width / 2) - 10)
            .translate([width / 2, height / 2])
            .clipAngle(90)
            .precision(0.1);

        const path = d3.geoPath().projection(projection);

        // Layers
        const waterLayer = svg.append("g");
        const graticuleLayer = svg.append("g");
        const landLayer = svg.append("g");

        // Add Water (base sphere)
        waterLayer.append("path")
            .datum({ type: "Sphere" })
            .attr("class", "water")
            .attr("d", path)
            .attr("fill", "#0f172a") // Deep blue/slate
            .attr("stroke", "#1e293b")
            .attr("stroke-width", 2);

        // Add Graticule (grid lines)
        const graticule = d3.geoGraticule();
        graticuleLayer.append("path")
            .datum(graticule)
            .attr("class", "graticule")
            .attr("d", path)
            .attr("fill", "none")
            .attr("stroke", "#1e293b")
            .attr("stroke-width", 0.5)
            .attr("stroke-opacity", 0.5);

        // --- DRAG INTERACTION ---
        const drag = d3.drag()
            .on("drag", (event) => {
                const rotate = projection.rotate();
                // Adjust rotation sensitivity
                const k = 50 / projection.scale();
                projection.rotate([
                    rotate[0] + event.dx * k,
                    rotate[1] - event.dy * k
                ]);
                updatePaths();
            });
        
        svg.call(drag);

        function updatePaths() {
            landLayer.selectAll("path").attr("d", path);
            graticuleLayer.selectAll("path").attr("d", path);
            waterLayer.selectAll("path").attr("d", path);
        }

        // --- MATH / DISTANCE CALCULATION ---
        // Haversine formula to calculate distance between two [lon, lat] coordinates in km
        function getDistance(coord1, coord2) {
            const R = 6371; // Earth radius in km
            const dLat = (coord2[1] - coord1[1]) * Math.PI / 180;
            const dLon = (coord2[0] - coord1[0]) * Math.PI / 180;
            const lat1 = coord1[1] * Math.PI / 180;
            const lat2 = coord2[1] * Math.PI / 180;

            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.sin(dLon/2) * Math.sin(dLon/2) * Math.cos(lat1) * Math.cos(lat2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return R * c;
        }

        // Determine color based on distance
        function getColorForDistance(distance) {
            if (distance === 0) return '#22c55e'; // Exact match (Green)
            
            // Map distance to HSL lightness (closer = darker red, further = lighter pink/white)
            const ratio = Math.min(distance, MAX_DISTANCE) / MAX_DISTANCE;
            // Lightness goes from 35% (close) to 90% (far)
            const lightness = 35 + (ratio * 55);
            return `hsl(0, 100%, ${lightness}%)`;
        }

        // --- INIT DATA ---
        async function init() {
            try {
                // Fetch low-res world GeoJSON
                const response = await fetch("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson");
                const data = await response.json();
                
                // Filter out Antarctica and missing names
                worldData = data.features.filter(d => d.id !== "ATA" && d.properties.name);
                
                // Pre-calculate centroids for all countries
                worldData.forEach(feature => {
                    feature.properties.centroid = d3.geoCentroid(feature);
                });

                // Pick random target
                targetCountry = worldData[Math.floor(Math.random() * worldData.length)];
                
                // Debug cheat:
                console.log("Pssst. The target is:", targetCountry.properties.name);

                // Populate Datalist
                const datalist = document.getElementById('countries-list');
                worldData.forEach(d => {
                    const option = document.createElement('option');
                    option.value = d.properties.name;
                    datalist.appendChild(option);
                });

                // Render Map initially (all default color)
                landLayer.selectAll("path")
                    .data(worldData)
                    .enter()
                    .append("path")
                    .attr("class", "country")
                    .attr("d", path)
                    .attr("fill", "#374151") // Default gray
                    .attr("stroke", "#1f2937")
                    .attr("stroke-width", 0.5)
                    .attr("id", d => `country-${d.id}`);

                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error("Shit, failed to load map data:", err);
                document.getElementById('loading').innerText = "Failed to load map data. Check console.";
            }
        }

        // --- GAME LOGIC ---
        document.getElementById('guess-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (isGameOver) return;

            const inputElement = document.getElementById('guess-input');
            const errorElement = document.getElementById('error-msg');
            const guessName = inputElement.value.trim().toLowerCase();
            
            errorElement.classList.add('hidden');

            if (!guessName) return;

            // Find feature by name
            const feature = worldData.find(d => d.properties.name.toLowerCase() === guessName);
            
            // Validate
            if (!feature) {
                errorElement.innerText = "That country doesn't exist in our data.";
                errorElement.classList.remove('hidden');
                return;
            }

            if (guesses.some(g => g.feature.id === feature.id)) {
                errorElement.innerText = "You already guessed that, genius.";
                errorElement.classList.remove('hidden');
                return;
            }

            // Calculate Distance
            const distance = getDistance(feature.properties.centroid, targetCountry.properties.centroid);
            
            // Add to guesses and sort
            guesses.push({ feature, distance });
            guesses.sort((a, b) => a.distance - b.distance); // Closest first

            updateUI(feature, distance);

            inputElement.value = '';
            
            // Check win condition
            if (feature.id === targetCountry.id) {
                handleWin();
            }
        });

        function updateUI(latestFeature, latestDistance) {
            // 1. Update Map Colors
            landLayer.selectAll(".country")
                .attr("fill", d => {
                    const guessRecord = guesses.find(g => g.feature.id === d.id);
                    if (guessRecord) {
                        return getColorForDistance(guessRecord.distance);
                    }
                    return "#374151"; // Default
                })
                .attr("stroke", d => {
                    const guessRecord = guesses.find(g => g.feature.id === d.id);
                    return guessRecord ? "#111827" : "#1f2937";
                });

            // 2. Rotate globe to the latest guess smoothly
            d3.transition()
                .duration(1000)
                .tween("rotate", () => {
                    const targetRotation = [-latestFeature.properties.centroid[0], -latestFeature.properties.centroid[1]];
                    const r = d3.interpolate(projection.rotate(), targetRotation);
                    return function(t) {
                        projection.rotate(r(t));
                        updatePaths();
                    };
                });

            // 3. Update Guesses List
            const ul = document.getElementById('guesses-ul');
            ul.innerHTML = '';
            
            guesses.forEach(g => {
                const li = document.createElement('li');
                const color = getColorForDistance(g.distance);
                const isCorrect = g.distance === 0;
                
                li.className = `flex justify-between items-center p-3 rounded font-semibold ${isCorrect ? 'bg-green-900/40 text-green-400 border border-green-700' : 'bg-gray-700/50 text-gray-200'}`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-sm shadow-sm" style="background-color: ${color}"></div>
                        <span>${g.feature.properties.name}</span>
                    </div>
                    <span>${isCorrect ? 'Target!' : Math.round(g.distance).toLocaleString() + ' km'}</span>
                `;
                ul.appendChild(li);
            });

            document.getElementById('guess-counter').innerText = guesses.length;
        }

        function handleWin() {
            isGameOver = true;
            document.getElementById('guess-input').disabled = true;
            document.getElementById('guess-btn').disabled = true;
            
            document.getElementById('target-name-display').innerText = targetCountry.properties.name;
            document.getElementById('guess-count-display').innerText = guesses.length;
            document.getElementById('win-message').classList.remove('hidden');
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const newWidth = wrapper.clientWidth;
            const newHeight = wrapper.clientHeight;
            svg.attr("width", newWidth).attr("height", newHeight);
            projection
                .scale((newWidth / 2) - 10)
                .translate([newWidth / 2, newHeight / 2]);
            updatePaths();
        });

        // Start
        async function boot() {
            await setupDiscord();
            await init();
        }
        boot();

    </script>
</body>
</html>
